<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-box">
        <div class="todo-box">
                <h1>To-Do List<img src = "img1.png"></h1>
                <div class="rows">
                <input type="text" id="input-box" placeholder="Add a new task">
                <button onclick="addlist()">Add</button> 
             </div>
                <ul id="todo-content"></ul>
        </div>
    </div>
    <div id="pop-up" class="pop-up-message" onclick="showPopup()">Task completed successfully congratulation!🥳</div>
    <script src="script.js"></script>
</body>
</html>
